services:
  cli-proxy-api:
    image: eceasy/cli-proxy-api:v7.1.20-s.1
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-none}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: cli-proxy-api
    network_mode: host
    # env_file:
    #   - .env
    environment:
      DEPLOY: ${DEPLOY:-}
    ports:
      - "8317:8317"
      - "8085:8085"
      - "1455:1455"
      - "54545:54545"
      - "51121:51121"
      - "11451:11451"
    user: "root"
    volumes:
      - ${CLI_PROXY_CONFIG_PATH:-./config.yaml}:/app/config.yaml
      - ${CLI_PROXY_AUTH_PATH:-./auths}:/root/.cli-proxy-api
      - ${CLI_PROXY_LOG_PATH:-./logs}:/app/logs
      - /home/skloxo/cpa-official/management:/app/management
    restart: unless-stopped
